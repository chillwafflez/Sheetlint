[theme]
# Professional blue-slate palette. Tweak primaryColor to rebrand.
base = "light"
primaryColor = "#2563EB"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F5F9"
textColor = "#0F172A"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true
runOnSave = true
